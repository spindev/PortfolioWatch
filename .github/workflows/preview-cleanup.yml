name: PR Preview Cleanup

on:
  # pull_request_target runs in the base-branch context (trusted) so it does
  # not require manual approval for bot-authored PRs.
  pull_request_target:
    types: [closed]

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: write       # push removal commit to gh-pages branch
  pull-requests: write  # update the preview comment

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          PREVIEW_DIR="pr-preview/pr-${{ github.event.number }}"
          if [ -d "$PREVIEW_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PREVIEW_DIR"
            git commit -m "chore: remove preview for PR #${{ github.event.number }}"
            git push
          else
            echo "Preview directory $PREVIEW_DIR not found – nothing to remove."
          fi

      - name: Update preview comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- portfoliowatch-pr-preview -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (!existing) return;

            const updatedBody = existing.body.replace(
              '✅ Bereit',
              '🗑️ Entfernt'
            ) + '\n\n> ⚠️ **Vorschau wurde nach dem Schließen des Pull Requests entfernt.**';

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: updatedBody,
            });
