name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # Re-deploy every hour on weekdays 8 AM–9 PM UTC, covering EU market hours
    # (8 AM–4 PM UTC) and US market hours (2:30 PM–9 PM UTC)
    - cron: '0 8-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch finance data
        # Fetches Yahoo Finance data server-side (no CORS) and writes static
        # JSON files to public/data/ so the app can read them as same-origin
        # resources on GitHub Pages — no proxy or external account required.
        run: node scripts/fetch-finance-data.mjs

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          # Keep PR preview directories when deploying the main site.
          clean-exclude: pr-preview/

