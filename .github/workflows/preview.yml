name: PR Preview

on:
  # pull_request_target runs in the base-branch context (trusted by GitHub,
  # no manual approval gate for bot-authored PRs).  It only takes effect once
  # this workflow file is merged to the base branch; until then use the
  # workflow_dispatch trigger below as a manual fallback.
  pull_request_target:
    types: [opened, synchronize, reopened]

  # Manual fallback: allows the repo owner to trigger a preview build from
  # the Actions tab for any PR, e.g. while this workflow is still in a branch
  # and pull_request_target hasn't taken effect on main yet.
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to build the preview for'
        required: true
        type: string

# Allow only one preview build per PR at a time; cancel older runs.
concurrency:
  group: pr-preview-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: write       # push to gh-pages branch
  pull-requests: write  # comment on the PR

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      # Works for both pull_request_target (event context) and workflow_dispatch (input).
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
      # For pull_request_target the head SHA is in the event; for workflow_dispatch
      # github.sha is the latest commit on the selected branch — both are correct.
      HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch finance data
        run: node scripts/fetch-finance-data.mjs

      - name: Build with PR-specific base path
        env:
          VITE_BASE: /PortfolioWatch/pr-preview/pr-${{ env.PR_NUMBER }}/
        run: npm run build

      - name: Deploy preview to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: pr-preview/pr-${{ env.PR_NUMBER }}
          clean: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
          HEAD_SHA: ${{ env.HEAD_SHA }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            const headSha  = process.env.HEAD_SHA;
            const previewUrl = `https://spindev.github.io/PortfolioWatch/pr-preview/pr-${prNumber}/`;
            const marker = '<!-- portfoliowatch-pr-preview -->';
            const body = `${marker}
            ## 🔍 Vorschau-Deployment

            | | |
            |---|---|
            | **Status** | ✅ Bereit |
            | **Vorschau** | ${previewUrl} |
            | **Commit** | ${headSha} |

            > Die Vorschau wird bei jedem Push auf diesen Branch aktualisiert und nach dem Schließen des Pull Requests automatisch entfernt.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
