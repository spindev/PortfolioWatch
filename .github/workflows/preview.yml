name: PR Preview

on:
  # push fires on every commit pushed to a branch (reads the workflow file from
  # that branch itself — no base-branch lookup).
  # Pushes to main and gh-pages are excluded; those have their own workflows.
  push:
    branches-ignore:
      - main
      - gh-pages

# Cancel any in-progress run for the same branch when a new push arrives.
concurrency:
  group: pr-preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write       # push to gh-pages branch
  pull-requests: write  # comment on the PR

jobs:
  # ── Job 1: look up the PR number immediately (no gate) ──────────────────────
  find-pr:
    runs-on: ubuntu-latest
    outputs:
      has_pr:    ${{ steps.pr.outputs.has_pr }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
    steps:
      - name: Find open PR for this branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });
            if (prs.length === 0) {
              core.info(`No open PR found for branch '${branch}' – skipping preview.`);
              core.setOutput('has_pr', 'false');
              return;
            }
            core.setOutput('has_pr', 'true');
            core.setOutput('pr_number', String(prs[0].number));

  # ── Job 2: build & deploy (gated by the 'pr-preview' environment) ───────────
  # Create the environment at:
  #   Repository Settings → Environments → New environment → "pr-preview"
  # Add yourself (spindev) as a Required Reviewer so you receive a single
  # approval request per push instead of a blanket workflow-level gate.
  deploy:
    needs: find-pr
    if: needs.find-pr.outputs.has_pr == 'true'
    runs-on: ubuntu-latest
    environment: pr-preview
    env:
      PR_NUMBER: ${{ needs.find-pr.outputs.pr_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch finance data
        run: node scripts/fetch-finance-data.mjs

      - name: Build with PR-specific base path
        env:
          VITE_BASE: /PortfolioWatch/pr-preview/pr-${{ env.PR_NUMBER }}/
        run: npm run build

      # Without .nojekyll at the gh-pages root GitHub Pages runs Jekyll, which
      # can fail silently and serve 404s for all sub-paths of the site.
      # This step idempotently creates the file so Jekyll is disabled globally.
      - name: Ensure .nojekyll at gh-pages root
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              await github.rest.repos.getContent({
                owner, repo, path: '.nojekyll', ref: 'gh-pages',
              });
              core.info('.nojekyll already present at gh-pages root – skipping.');
            } catch (err) {
              if (err.status !== 404) throw err;
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo,
                path: '.nojekyll',
                message: 'ci: disable Jekyll on gh-pages [skip ci]',
                content: '',
                branch: 'gh-pages',
              });
              core.info('Created .nojekyll at gh-pages root.');
            }

      - name: Deploy preview to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: pr-preview/pr-${{ env.PR_NUMBER }}
          clean: true

      # Wait for GitHub Pages CDN to propagate, then verify the URL is reachable.
      # A non-200 status here means Pages is not yet configured or still building;
      # in that case configure it at: Settings → Pages → Source → Deploy from a
      # branch → gh-pages → / (root) → Save.
      - name: Verify preview URL is reachable
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
        run: |
          PREVIEW_URL="https://spindev.github.io/PortfolioWatch/pr-preview/pr-${PR_NUMBER}/"
          echo "Waiting 60 s for GitHub Pages to build and CDN to propagate…"
          sleep 60
          HTTP_STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$PREVIEW_URL")
          echo "HTTP status for $PREVIEW_URL → $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Preview is live!"
          else
            echo "⚠️  Got $HTTP_STATUS – GitHub Pages may still be building."
            echo "   If this persists, check: https://github.com/spindev/PortfolioWatch/settings/pages"
            echo "   Source must be set to: Deploy from a branch → gh-pages → / (root)"
          fi

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.sha }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            const headSha  = process.env.HEAD_SHA;
            const previewUrl = `https://spindev.github.io/PortfolioWatch/pr-preview/pr-${prNumber}/`;
            const marker = '<!-- portfoliowatch-pr-preview -->';
            const table = [
              '| | |',
              '|---|---|',
              `| **Status** | ✅ Bereit |`,
              `| **Vorschau** | ${previewUrl} |`,
              `| **Commit** | ${headSha} |`,
            ].join('\n');
            const body = [
              marker,
              '## 🔍 Vorschau-Deployment',
              '',
              table,
              '',
              '> Die Vorschau wird bei jedem Push auf diesen Branch aktualisiert und nach dem Schließen des Pull Requests automatisch entfernt.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            // Delete existing preview comment so the new one appears as fresh
            // activity (GitHub does not notify for silent comment updates).
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
