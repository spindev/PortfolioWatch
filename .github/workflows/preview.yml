name: PR Preview

on:
  # pull_request_target runs in the base-branch context so it is trusted by
  # GitHub and does not require manual approval for bot-authored PRs.
  # The checkout step below pins to the PR head SHA so we always build the
  # actual PR code.  This is safe because only same-repository branches
  # (no forks) trigger this workflow.
  pull_request_target:
    types: [opened, synchronize, reopened]

# Allow only one preview build per PR at a time; cancel older runs.
concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: write       # push to gh-pages branch
  pull-requests: write  # comment on the PR

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Explicitly check out the PR head commit so we build the PR code,
          # not the base branch.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch finance data
        run: node scripts/fetch-finance-data.mjs

      - name: Build with PR-specific base path
        env:
          VITE_BASE: /PortfolioWatch/pr-preview/pr-${{ github.event.number }}/
        run: npm run build

      - name: Deploy preview to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: pr-preview/pr-${{ github.event.number }}
          clean: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = `https://spindev.github.io/PortfolioWatch/pr-preview/pr-${{ github.event.number }}/`;
            const marker = '<!-- portfoliowatch-pr-preview -->';
            const body = `${marker}
            ## 🔍 Vorschau-Deployment

            | | |
            |---|---|
            | **Status** | ✅ Bereit |
            | **Vorschau** | ${previewUrl} |
            | **Commit** | ${{ github.event.pull_request.head.sha }} |

            > Die Vorschau wird bei jedem Push auf diesen Branch aktualisiert und nach dem Schließen des Pull Requests automatisch entfernt.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
