<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Grid lines -->
  <line x1="100" y1="530" x2="1100" y2="530" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="430" x2="1100" y2="430" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="330" x2="1100" y2="330" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="230" x2="1100" y2="230" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="130" x2="1100" y2="130" stroke="#1e293b" stroke-width="1"/>
  <!-- Chart area fill -->
  <polygon points="100,530 100,420 250,380 400,350 550,300 700,260 850,200 1000,160 1100,130 1100,530" fill="#2563eb" fill-opacity="0.15"/>
  <!-- Chart line -->
  <polyline points="100,420 250,380 400,350 550,300 700,260 850,200 1000,160 1100,130" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Green dot at end -->
  <circle cx="1100" cy="130" r="8" fill="#34d399"/>
  <!-- Logo icon -->
  <rect x="80" y="60" width="64" height="64" rx="16" fill="#2563eb"/>
  <polyline points="96,108 112,88 128,96 144,76 160,80" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- App name -->
  <text x="162" y="90" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="40" fill="white">PortfolioWatch</text>
  <text x="162" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94a3b8">ETF Portfolio Tracker</text>
  <!-- Tagline -->
  <text x="600" y="580" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b">Live prices · Performance charts · Auto-refresh · Free &amp; open source</text>
</svg>
